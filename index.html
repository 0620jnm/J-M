<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Jay & Michelle Wedding Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1a1a1a;        /* 深色背景 */
      --card-bg: #262626;        /* 卡片深灰 */
      --gold-color: #d4af37;     /* 經典金 */
      --gold-light: #f1d592;     /* 亮金 */
      --text-main: #e0e0e0;      /* 主文字色 */
    }

    /* 淡入效果 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    * {
      box-sizing: border-box;
      font-family: 'Noto Serif TC', serif; /* 統一字體 */
    }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 16px;
      animation: fadeInUp 1.2s ease-out forwards;
    }

    h1 { 
      text-align: center; 
      color: var(--gold-color);
      font-size: 2.2rem;
      margin-bottom: 8px;
      letter-spacing: 3px;
    }
    
    .subtitle {
      text-align: center;
      font-size: 1rem;
      color: var(--gold-light);
      margin-bottom: 40px;
      letter-spacing: 5px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
      border: 1.5px solid var(--gold-color); /* 金色外框 */
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: fadeInUp 1s ease-out 0.3s backwards;
    }

    /* 統一按鈕樣式 */
    .btn-custom, button {
      display: inline-block;
      width: 100%;
      max-width: 280px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      color: var(--bg-dark);
      background: var(--gold-color);
      border: 2px solid var(--gold-color);
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s ease;
      margin: 10px auto;
      text-decoration: none;
    }

    /* 按鈕點擊效果 */
    .btn-custom:active, button:active {
      transform: scale(0.96);
      box-shadow: 0 0 15px var(--gold-color);
    }

    .btn-custom:hover, button:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
    }

    /* 隱藏預設 input file，用 label 做成金色按鈕 */
    #fileInput { display: none; }
    .file-label {
      background: transparent;
      color: var(--gold-color);
      margin-bottom: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .photo-item {
      background: #000;
      border-radius: 10px;
      padding: 8px;
      border: 1px solid #444;
      animation: fadeInUp 0.8s ease-out;
    }

    .photo-item img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 6px;
      cursor: zoom-in;
    }

    /* 照片下方的小按鈕也要統一 */
    .photo-buttons { display: flex; gap: 8px; margin-top: 10px; }
    .photo-buttons button {
      padding: 8px;
      font-size: 13px;
      flex: 1;
    }
    .btn-danger { background: #8b0000; border-color: #8b0000; color: white; }

    .status { font-size: 14px; color: var(--gold-light); text-align: center; margin-top: 10px; min-height: 20px; }

    /* 全相簿切換控制 */
    #allPhotosSection { display: none; }
    .viewing-all #mainUploadSection, .viewing-all #previewTitle, .viewing-all #viewAllBtn { display: none; }
    .viewing-all #allPhotosSection { display: block; }

    #previewOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    #previewImage { max-width: 95%; max-height: 95%; border: 3px solid var(--gold-color); }
  </style>
</head>
<body>

  <h1>JAY & MICHELLE</h1>
  <div class="subtitle">WEDDING GALLERY</div>

  <div id="mainUploadSection" class="card" style="text-align: center;">
    <label for="fileInput" class="btn-custom file-label">＋ 選擇照片</label>
    <input id="fileInput" type="file" accept="image/*" multiple />
    
    <button id="uploadBtn">上傳照片分享幸福</button>
    <div id="uploadStatus" class="status"></div>
  </div>

  <div class="card">
    <h3 id="previewTitle" style="text-align: center; color: var(--gold-color); margin-top: 0;">最新動態</h3>
    <div id="gallery" class="gallery"></div>
    
    <button id="viewAllBtn" class="btn-custom" style="margin-top: 30px;">瀏覽所有相簿照片</button>

    <div id="allPhotosSection">
      <h3 style="text-align: center; color: var(--gold-color); margin-top: 0;">婚禮相簿全集</h3>
      <div id="fullGallery" class="gallery"></div>
      <button id="backBtn" class="btn-custom" style="background: transparent; color: var(--gold-color); margin-top: 40px;">返回上傳頁面</button>
    </div>

    <p id="emptyMsg" style="text-align:center; color:#666; display:none; font-style: italic;">尚未有照片上傳</p>
  </div>

  <div id="previewOverlay">
    <img id="previewImage" src="" alt="預覽">
  </div>

  <script type="module">
    // (此處保留之前的 Firebase 與 Cloudinary 邏輯，僅需更新部分 UI 控制代碼)
    const CLOUD_NAME    = "dclcbrfs8"; 
    const UPLOAD_PRESET = "wedding-photos"; 

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, deleteDoc, doc } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzK8lLQTr_Z3dn-TNOUslX1sAw3PV9TY0",
      authDomain: "wedding-ef203.firebaseapp.com",
      projectId: "wedding-ef203",
      storageBucket: "wedding-ef203.firebasestorage.app",
      messagingSenderId: "791365577253",
      appId: "1:791365577253:web:018970a9904007b3e8adcc",
      measurementId: "G-C086ETKN7J"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);
    const photosCol = collection(db, "wedding_photos");

    const gallery = document.getElementById("gallery");
    const fullGallery = document.getElementById("fullGallery");
    const viewAllBtn = document.getElementById("viewAllBtn");
    const backBtn = document.getElementById("backBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");

    let currentUser = null;

    viewAllBtn.onclick = () => {
      document.body.classList.add('viewing-all');
      loadGallery(true);
      window.scrollTo(0, 0);
    };
    backBtn.onclick = () => {
      document.body.classList.remove('viewing-all');
      loadGallery(false);
      window.scrollTo(0, 0);
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) { currentUser = user; await loadGallery(false); }
      else { await signInAnonymously(auth); }
    });

    function getDisplayUrl(url) {
      return url.replace('/upload/', '/upload/c_scale,w_800,q_auto,f_auto/');
    }

    async function loadGallery(isFull = false) {
      const targetGallery = isFull ? fullGallery : gallery;
      targetGallery.innerHTML = "";
      document.getElementById("emptyMsg").style.display = "none";

      try {
        const q = isFull 
          ? query(photosCol, orderBy("createdAt", "desc")) 
          : query(photosCol, orderBy("createdAt", "desc"), limit(3));
        
        const snap = await getDocs(q);
        if (snap.empty) { document.getElementById("emptyMsg").style.display = "block"; return; }

        snap.forEach(docSnap => {
          const data = docSnap.data();
          const div = document.createElement("div");
          div.className = "photo-item";
          div.innerHTML = `
            <img src="${getDisplayUrl(data.url)}" onclick="showPreview('${getDisplayUrl(data.url)}')">
            <div class="photo-buttons">
              <button onclick="downloadImage('${data.url}', 'Wedding_${data.publicId}.jpg')">下載</button>
              ${currentUser && data.ownerId === currentUser.uid ? `<button class="btn-danger" onclick="deletePhoto('${docSnap.id}')">刪除</button>` : ''}
            </div>
          `;
          targetGallery.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    window.showPreview = (url) => {
      const overlay = document.getElementById("previewOverlay");
      const img = document.getElementById("previewImage");
      img.src = url;
      overlay.style.display = "flex";
    };

    document.getElementById("previewOverlay").onclick = function() { this.style.display = "none"; };

    window.downloadImage = async (url, filename) => {
      const res = await fetch(url, { mode: 'cors' });
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    };

    window.deletePhoto = async (id) => {
      if (confirm("確定刪除？")) {
        await deleteDoc(doc(db, "wedding_photos", id));
        loadGallery(document.body.classList.contains('viewing-all'));
      }
    };

    uploadBtn.onclick = async () => {
      const files = Array.from(fileInput.files);
      if (!files.length) return;
      uploadBtn.disabled = true;
      document.getElementById("uploadStatus").textContent = "正在傳送...";

      for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
        const result = await res.json();
        await addDoc(photosCol, { publicId: result.public_id, url: result.secure_url, ownerId: currentUser.uid, createdAt: serverTimestamp() });
      }
      document.getElementById("uploadStatus").textContent = "完成！";
      fileInput.value = "";
      uploadBtn.disabled = false;
      loadGallery(false);
    };
  </script>
</body>
</html>
