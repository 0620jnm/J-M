<style>
  /* ... 保留原有樣式 ... */
  .selection-controls { 
    display: none; justify-content: space-between; align-items: center; 
    width: 100%; padding: 10px 0; border-top: 1px solid #eee; margin-top: 10px;
  }
  .viewing-all .selection-controls { display: flex; }
  
  /* 多選框樣式 */
  .photo-item { position: relative; }
  .select-checkbox {
    position: absolute; top: 8px; left: 8px; width: 22px; height: 22px;
    accent-color: var(--rose-gold); z-index: 5; display: none;
  }
  .multi-select-active .select-checkbox { display: block; }
  .multi-select-active .photo-buttons { opacity: 0.3; pointer-events: none; }
  
  .badge {
    background: var(--rose-gold); color: white; padding: 2px 8px;
    border-radius: 10px; font-size: 10px; margin-left: 5px;
  }
</style>

<div id="allPhotosSection">
  <div class="btn-container">
      <button class="btn-custom back-btn-ui backBtnAction">返回</button>
  </div>
  
  <h3 style="text-align: center; color: var(--rose-gold); font-size: 0.85rem; margin-top: 15px;">
    ALL MEMORIES <span id="selectCountBadge" class="badge" style="display:none">0</span>
  </h3>

  <div class="btn-container" style="flex-direction: row; justify-content: center; gap: 10px;">
    <button id="toggleSelectBtn" class="btn-custom btn-outline" style="width: 100px; background: white; color: var(--rose-gold); border: 1px solid var(--rose-gold);">開啟多選</button>
    <button id="downloadSelectedBtn" class="btn-custom" style="width: 100px; display: none;">下載所選</button>
  </div>

  <div id="fullGallery" class="gallery-full"></div>
  
  <div class="btn-container">
      <button class="btn-custom back-btn-ui backBtnAction">返回</button>
  </div>
</div>

<script type="module">
  // ... 保留原有 Firebase 設定與變數 ...
  let isMultiSelectMode = false;

  // 修改 loadGallery 函數中的 innerHTML 部分
  // 在 snap.forEach 裡面，幫 img 前面加上 checkbox
  /* div.innerHTML = `
      <input type="checkbox" class="select-checkbox" data-url="${data.url}">
      <img src="${data.url.replace('/upload/', '/upload/c_fill,h_600,w_600,q_auto,f_auto/')}" onclick="handlePhotoClick(this, '${data.url}')">
      ...
  */

  // 新增：切換多選模式
  document.getElementById("toggleSelectBtn").onclick = function() {
    isMultiSelectMode = !isMultiSelectMode;
    const gallery = document.getElementById("fullGallery");
    const downloadBtn = document.getElementById("downloadSelectedBtn");
    const badge = document.getElementById("selectCountBadge");

    if (isMultiSelectMode) {
      this.textContent = "取消多選";
      gallery.classList.add("multi-select-active");
      downloadBtn.style.display = "flex";
      badge.style.display = "inline";
    } else {
      this.textContent = "開啟多選";
      gallery.classList.remove("multi-select-active");
      downloadBtn.style.display = "none";
      badge.style.display = "none";
      // 清空選取
      document.querySelectorAll('.select-checkbox').forEach(cb => cb.checked = false);
      updateBadge();
    }
  };

  // 新增：處理照片點擊（多選模式下變勾選，一般模式下變放大）
  window.handlePhotoClick = (el, url) => {
    if (isMultiSelectMode) {
      const cb = el.parentElement.querySelector('.select-checkbox');
      cb.checked = !cb.checked;
      updateBadge();
    } else {
      showBig(url);
    }
  };

  function updateBadge() {
    const count = document.querySelectorAll('.select-checkbox:checked').length;
    document.getElementById("selectCountBadge").textContent = count;
  }

  // 新增：批次下載邏輯
  document.getElementById("downloadSelectedBtn").onclick = async function() {
    const selected = document.querySelectorAll('.select-checkbox:checked');
    if (selected.length === 0) return alert("請先勾選照片");
    
    if (confirm(`確定下載這 ${selected.length} 張照片嗎？\n(提示：瀏覽器可能會詢問是否允許開啟多個視窗)`)) {
      selected.forEach((cb, index) => {
        // 使用延遲觸發，避免被瀏覽器當作惡意廣告攔截
        setTimeout(() => {
          const link = document.createElement('a');
          link.href = cb.getAttribute('data-url');
          link.download = `wedding_photo_${index}.jpg`;
          link.target = "_blank";
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }, index * 400); // 每 0.4 秒下載一張
      });
    }
  };
</script>
