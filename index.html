<script type="module">
    // ... (前方的 Firebase 設定保持不變) ...

    document.getElementById("uploadBtn").onclick = async () => {
      if(!selectedFiles.length) return;
      
      const btn = document.getElementById("uploadBtn");
      const status = document.getElementById("uploadStatus");
      const pc = document.getElementById("previewContainer");
      const info = document.getElementById("selectionInfo");
      
      const count = selectedFiles.length;
      btn.disabled = true;
      
      // 建立一個旗標，確保迴圈中若有失敗不會中斷其他上傳
      let successCount = 0;

      for(let i=0; i < count; i++){
        status.textContent = `正在發送 (${i+1}/${count})...`;
        
        const fd = new FormData();
        fd.append("file", selectedFiles[i]);
        fd.append("upload_preset", "wedding-photos");

        try {
          // 1. 先上傳到 Cloudinary
          const res = await fetch(`https://api.cloudinary.com/v1_1/dfcbhdvq8/upload`, { 
            method: "POST", 
            body: fd 
          });
          const data = await res.json();
          
          if (data.secure_url) {
            // 2. 務必「等待」寫入 Firebase 成功
            await addDoc(photosCol, { 
              url: data.secure_url, 
              uid: currentUser.uid, 
              createdAt: serverTimestamp() 
            });
            successCount++;
          }
        } catch(e) {
          console.error("單張上傳失敗:", e);
        }
      }

      // 全部執行完畢後才更新 UI
      if (successCount > 0) {
        status.textContent = `成功上傳 ${successCount} 張照片，謝謝您的分享！`;
        selectedFiles = []; 
        pc.innerHTML = ""; 
        pc.classList.remove('active');
        info.textContent = "";
        
        // 重新載入相簿查看新成果
        loadGallery(false);
      } else {
        status.textContent = "上傳似乎遇到了點問題，請再試一次。";
      }

      // 4 秒後清空狀態文字，恢復按鈕
      setTimeout(() => { 
        status.textContent = ""; 
        btn.disabled = false; 
      }, 4000);
    };

    // ... (其餘 loadGallery 等函數保持不變) ...
</script>
