<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Jay & Michelle Wedding Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #a78b71;
      --secondary-color: #e8dcd4;
      --accent-color: #8da399;
      --bg-color: #f9f7f5;
      --text-color: #5a4a42;
    }

    /* 3. 全頁面與元素淡入效果 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: 'Noto Serif TC', serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
      background: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      opacity: 0; /* 初始隱藏，配合動畫 */
      animation: fadeInUp 1.2s ease-out forwards;
    }

    h1 { 
      text-align: center; 
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--primary-color);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #9e918a;
      margin-bottom: 40px;
      letter-spacing: 4px;
    }

    .card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(167, 139, 113, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      /* 讓卡片也有微小的延遲淡入感 */
      animation: fadeInUp 1s ease-out 0.3s backwards;
    }

    .upload-area { 
      text-align: center; 
      border: 2px dashed var(--secondary-color); 
      transition: all 0.3s ease;
    }
    
    .upload-area:hover {
      border-color: var(--primary-color);
      background: rgba(255, 255, 255, 1);
    }

    button {
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-size: 15px;
      font-family: 'Noto Serif TC', serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .btn-primary { 
      background: linear-gradient(135deg, #a78b71 0%, #8d7661 100%); 
      color: #fff; 
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(167, 139, 113, 0.3);
    }

    .btn-danger { background: #f4b0b0; color: #fff; padding: 6px 14px; font-size: 12px; }
    .btn-download { background: var(--accent-color); color: #fff; padding: 6px 14px; font-size: 12px; }

    /* 相簿格線：1. 限制只顯示最新三張的佈局 */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .photo-item {
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      padding: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      animation: fadeInUp 0.8s ease-out;
    }

    .photo-item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
      cursor: zoom-in;
      background: #f0f0f0;
    }

    .photo-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .status { font-size: 14px; color: var(--primary-color); text-align: center; margin-top: 15px; height: 20px; font-style: italic; }

    /* 放大預覽層 */
    #previewOverlay {
      position: fixed;
      inset: 0;
      background: rgba(45, 38, 34, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: zoom-out;
    }
    #previewImage {
      max-width: 90%;
      max-height: 90%;
      border: 5px solid #fff;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>Jay & Michelle</h1>
  <div class="subtitle">WEDDING DAY</div>

  <div class="card upload-area">
    <input id="fileInput" type="file" accept="image/*" multiple />
    <br />
    <button id="uploadBtn" class="btn-primary">分享我們的喜悅</button>
    <div id="uploadStatus" class="status"></div>
  </div>

  <div class="card">
    <h3 style="text-align: center; color: var(--primary-color); margin-top: 0; font-weight: 500;">最新幸福瞬間</h3>
    <div id="gallery" class="gallery"></div>
    <p id="emptyMsg" style="text-align:center; color:#bbb; display:none; font-style: italic;">期待您的第一張照片...</p>
  </div>

  <div id="previewOverlay">
    <img id="previewImage" src="" alt="預覽">
  </div>

  <script type="module">
    // Cloudinary & Firebase 設定
    const CLOUD_NAME    = "dclcbrfs8"; 
    const UPLOAD_PRESET = "wedding-photos"; 

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, deleteDoc } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzK8lLQTr_Z3dn-TNOUslX1sAw3PV9TY0",
      authDomain: "wedding-ef203.firebaseapp.com",
      projectId: "wedding-ef203",
      storageBucket: "wedding-ef203.firebasestorage.app",
      messagingSenderId: "791365577253",
      appId: "1:791365577253:web:018970a9904007b3e8adcc",
      measurementId: "G-C086ETKN7J"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);
    const photosCol = collection(db, "wedding_photos");

    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const uploadStatus = document.getElementById("uploadStatus");
    const gallery = document.getElementById("gallery");
    const emptyMsg = document.getElementById("emptyMsg");
    const previewOverlay = document.getElementById("previewOverlay");
    const previewImage = document.getElementById("previewImage");

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        await loadGallery();
      } else {
        await signInAnonymously(auth);
      }
    });

    // 2. 壓縮顯示照片 (Cloudinary 動態轉換)
    function getDisplayUrl(originalUrl) {
      // 插入 c_scale,w_800 (縮放寬度) 和 q_auto,f_auto (自動品質與格式轉換)
      return originalUrl.replace('/upload/', '/upload/c_scale,w_800,q_auto,f_auto/');
    }

    async function downloadImage(url, filename) {
      try {
        const res = await fetch(url, { mode: 'cors' });
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(blobUrl);
      } catch (e) {
        alert("下載失敗，請長按圖片手動儲存。");
      }
    }

    previewOverlay.addEventListener("click", () => {
      previewOverlay.style.display = "none";
      previewImage.src = "";
    });

    async function loadGallery() {
      gallery.innerHTML = "";
      emptyMsg.style.display = "none";
      try {
        // 1. 只取得最新三張照片：使用 limit(3)
        const q = query(photosCol, orderBy("createdAt", "desc"), limit(3));
        const snap = await getDocs(q);
        if (snap.empty) { emptyMsg.style.display = "block"; return; }

        snap.forEach(docSnap => {
          const data = docSnap.data();
          const div = document.createElement("div");
          div.className = "photo-item";

          const img = document.createElement("img");
          // 這裡使用壓縮過的網址供網頁顯示
          img.src = getDisplayUrl(data.url);
          img.onclick = () => {
            previewImage.src = getDisplayUrl(data.url);
            previewOverlay.style.display = "flex";
          };

          const btns = document.createElement("div");
          btns.className = "photo-buttons";

          const downBtn = document.createElement("button");
          downBtn.className = "btn-download";
          downBtn.textContent = "下載原圖";
          // 這裡傳入 data.url，確下載的是原始高畫質檔案
          downBtn.onclick = () => downloadImage(data.url, "Wedding_" + data.publicId + ".jpg");

          btns.appendChild(downBtn);

          if (currentUser && data.ownerId === currentUser.uid) {
            const delBtn = document.createElement("button");
            delBtn.className = "btn-danger";
            delBtn.textContent = "刪除";
            delBtn.onclick = async () => {
              if (confirm("要刪除這張照片嗎？")) {
                await deleteDoc(docSnap.ref);
                loadGallery();
              }
            };
            btns.appendChild(delBtn);
          }

          div.appendChild(img);
          div.appendChild(btns);
          gallery.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    async function handleUpload() {
      const files = Array.from(fileInput.files);
      if (!files.length || !currentUser) return;

      uploadBtn.disabled = true;
      uploadStatus.textContent = "正在傳送幸福...";

      try {
        for (const file of files) {
          const formData = new FormData();
          formData.append("file", file);
          formData.append("upload_preset", UPLOAD_PRESET);

          const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
            method: "POST",
            body: formData
          });
          const result = await res.json();

          await addDoc(photosCol, {
            publicId: result.public_id,
            url: result.secure_url,
            ownerId: currentUser.uid,
            createdAt: serverTimestamp()
          });
        }
        uploadStatus.textContent = "上傳成功！";
        fileInput.value = "";
        await loadGallery();
      } catch (e) {
        alert("上傳出錯，請檢查網路。");
      } finally {
        uploadBtn.disabled = false;
        setTimeout(() => uploadStatus.textContent = "", 3000);
      }
    }

    uploadBtn.onclick = handleUpload;
  </script>
</body>
</html>
