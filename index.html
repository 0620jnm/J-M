<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Jay & Michelle Wedding Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Dancing+Script:wght@600&family=Imperial+Script&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-gold: #c5a391;
      --text-dark: #5a4d4a;
      --danger-red: #d9534f;
    }

    @keyframes smoothFadeIn {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      opacity: 0;
      animation: smoothFadeIn 0.8s ease-out forwards;
    }

    body {
      margin: 0; min-height: 100vh;
      background-color: #fdfbfb;
      background-image: radial-gradient(at 0% 0%, rgba(245, 227, 224, 0.6) 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(247, 231, 206, 0.6) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text-dark);
      font-family: 'Noto Serif TC', serif;
      display: flex; flex-direction: column; align-items: center; padding: 20px 10px;
    }

    .container { width: 100%; max-width: 400px; }

    .header-section { text-align: center; position: relative; margin-bottom: 25px; padding: 15px 0; }
    h1 { color: var(--rose-gold); font-family: 'Dancing Script', cursive; font-size: 2.6rem; margin: 0; position: relative; z-index: 2; }
    .subtitle { font-size: 0.7rem; color: var(--rose-gold); margin: 0; letter-spacing: 3px; font-weight: 700; position: relative; z-index: 2; }
    .header-section::after {
      content: "Welcome"; font-family: 'Imperial Script', cursive; font-size: 8.5rem; color: rgba(197, 163, 145, 0.18);
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 18px; padding: 14px; margin-bottom: 16px; border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 20px rgba(109, 93, 90, 0.04);
    }

    .btn-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .btn-custom, button {
      width: 100%; max-width: 200px; padding: 10px 16px; font-family: 'Noto Serif TC', serif;
      font-size: 14px; font-weight: 700; border-radius: 22px; cursor: pointer; margin: 5px 0; border: none; transition: transform 0.1s;
    }
    .btn-custom:active, button:active { transform: scale(0.95); }

    #uploadBtn, #viewAllBtn { color: white; background: linear-gradient(135deg, #c5a391 0%, #b38d7a 100%); }
    .file-label, #backBtn { background: white !important; color: var(--rose-gold) !important; border: 1.2px solid var(--rose-gold) !important; }

    /* 縮圖區域優化：沒圖就不佔空間 */
    .preview-scroll { 
      display: flex; gap: 8px; overflow-x: auto; 
      padding: 0; width: 100%; height: 0; /* 預設高度 0 */
      transition: all 0.3s ease;
    }
    .preview-scroll.active { padding: 8px 0; height: 75px; } /* 有圖時才撐開 */

    .preview-item { position: relative; flex-shrink: 0; width: 60px; height: 60px; background: #eee; border-radius: 8px; overflow: hidden; }
    .preview-thumb { width: 100%; height: 100%; object-fit: cover; }
    .remove-btn { position: absolute; top: 2px; right: 2px; background: rgba(255,255,255,0.9); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; color: var(--text-dark); }

    .gallery-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 10px 0; }
    .photo-item { border-radius: 8px; overflow: hidden; background: #eee; }
    .photo-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    
    .photo-buttons { display: flex; gap: 4px; padding: 4px; justify-content: center; }
    .photo-buttons button { padding: 3px; font-size: 8px; margin: 0; max-width: 45px; border-radius: 12px; color: white !important; }
    .btn-save { background: var(--rose-gold) !important; }
    .btn-danger { background: var(--danger-red) !important; }

    #fileInput { display: none; }
    
    /* 進度條樣式 */
    .progress-wrap { width: 100%; max-width: 200px; height: 5px; background: #eee; border-radius: 10px; margin: 10px 0; display: none; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: var(--rose-gold); transition: width 0.2s; }
    .status { font-size: 12px; color: var(--rose-gold); text-align: center; margin-top: 5px; font-weight: 700; }

    #allPhotosSection { display: none; }
    .viewing-all #mainUploadSection, .viewing-all #previewTitle, .viewing-all #viewAllBtn, .viewing-all #gallery { display: none; }
    .viewing-all #allPhotosSection { display: block; }
    .gallery-full { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    #previewOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; }
    #previewImage { max-width: 95%; max-height: 90%; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-section fade-in">
      <h1>Jay & Michelle</h1>
      <div class="subtitle">WEDDING GALLERY</div>
    </div>

    <div id="mainUploadSection" class="card">
      <div class="btn-container">
          <label for="fileInput" class="btn-custom file-label">選擇相片</label>
          <input id="fileInput" type="file" accept="image/*" multiple />
          <div id="selectionInfo" style="font-size:11px; color:var(--rose-gold); margin-top:5px;"></div>
          <div id="previewContainer" class="preview-scroll"></div>
          <button id="uploadBtn">開始上傳</button>
          <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
      </div>
      <div id="uploadStatus" class="status"></div>
    </div>

    <div class="card">
      <h3 id="previewTitle" style="text-align: center; color: var(--rose-gold); font-size: 0.85rem;">LATEST</h3>
      <div id="gallery" class="gallery-preview"></div>
      <div class="btn-container">
          <button id="viewAllBtn">瀏覽所有照片</button>
      </div>
      <div id="allPhotosSection">
        <h3 style="text-align: center; color: var(--rose-gold); font-size: 0.85rem;">ALL MEMORIES</h3>
        <div id="fullGallery" class="gallery-full"></div>
        <div class="btn-container">
            <button id="backBtn" class="btn-custom file-label">返回</button>
        </div>
      </div>
      <p id="emptyMsg" style="text-align:center; color:#999; display:none; font-size: 12px; padding: 20px;">載入中...</p>
    </div>
  </div>

  <div id="previewOverlay"><img id="previewImage" src=""></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    const CLOUD_NAME = "dfcbhdvq8";
    const UPLOAD_PRESET = "wedding-photos";
    const firebaseConfig = {
      apiKey: "AIzaSyAUFF7GdX7fAtK_wK5-YAffirtap52UgCg",
      authDomain: "wedding-e6351.firebaseapp.com",
      projectId: "wedding-e6351",
      storageBucket: "wedding-e6351.firebasestorage.app",
      messagingSenderId: "382633819825",
      appId: "1:382633819825:web:b1dd463dd466752f78ec90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const photosCol = collection(db, "wedding_photos");

    let currentUser = null;
    let selectedFiles = []; 

    onAuthStateChanged(auth, async (user) => {
      if (user) { currentUser = user; loadGallery(false); }
      else { signInAnonymously(auth); }
    });

    document.getElementById("fileInput").onchange = (e) => {
      const files = Array.from(e.target.files);
      const container = document.getElementById("previewContainer");
      if (files.length > 0) container.classList.add('active');
      
      files.forEach(file => {
        selectedFiles.push(file);
        createCompressedPreview(file);
      });
      document.getElementById("selectionInfo").textContent = `已選取 ${selectedFiles.length} 張相片`;
      e.target.value = "";
    };

    function createCompressedPreview(file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_SIZE = 120;
          let width = img.width, height = img.height;
          if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
          else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          
          const wrapper = document.createElement("div");
          wrapper.className = "preview-item fade-in";
          wrapper.innerHTML = `<img src="${canvas.toDataURL('image/jpeg', 0.6)}" class="preview-thumb"><div class="remove-btn" onclick="removeFile(this)">✕</div>`;
          document.getElementById("previewContainer").appendChild(wrapper);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    window.removeFile = (btn) => {
      const item = btn.parentElement;
      const container = item.parentElement;
      const index = Array.from(container.children).indexOf(item);
      selectedFiles.splice(index, 1);
      item.remove();
      if (selectedFiles.length === 0) container.classList.remove('active');
      document.getElementById("selectionInfo").textContent = selectedFiles.length > 0 ? `已選取 ${selectedFiles.length} 張` : "";
    };

    document.getElementById("uploadBtn").onclick = async () => {
      if (!selectedFiles.length) return alert("請先選擇照片");
      const btn = document.getElementById("uploadBtn");
      const status = document.getElementById("uploadStatus");
      const bar = document.getElementById("progressBar");
      const wrap = document.getElementById("progressWrap");

      btn.disabled = true;
      wrap.style.display = "block";
      bar.style.width = "0%";
      
      for (let i = 0; i < selectedFiles.length; i++) {
        status.textContent = `上傳中 (${i+1}/${selectedFiles.length})`;
        try {
          const formData = new FormData();
          formData.append("file", selectedFiles[i]);
          formData.append("upload_preset", UPLOAD_PRESET);

          const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, { method: "POST", body: formData });
          const data = await res.json();
          if (data.secure_url) {
            await addDoc(photosCol, { url: data.secure_url, ownerId: currentUser.uid, createdAt: serverTimestamp() });
          }
        } catch (e) { console.error(e); }
        bar.style.width = `${((i+1)/selectedFiles.length)*100}%`;
      }

      // 上傳結束後，立刻隱藏進度條與狀態
      wrap.style.display = "none"; 
      status.textContent = "✅ 上傳成功！";
      
      selectedFiles = [];
      const container = document.getElementById("previewContainer");
      container.innerHTML = "";
      container.classList.remove('active');
      document.getElementById("selectionInfo").textContent = "";
      
      setTimeout(() => { status.textContent = ""; btn.disabled = false; }, 2000);
      loadGallery(false);
    };

    async function loadGallery(isFull = false) {
      const target = isFull ? document.getElementById("fullGallery") : document.getElementById("gallery");
      target.innerHTML = "";
      try {
        const q = isFull ? query(photosCol, orderBy("createdAt", "desc")) : query(photosCol, orderBy("createdAt", "desc"), limit(3));
        const snap = await getDocs(q);
        if (snap.empty) { document.getElementById("emptyMsg").style.display = "block"; return; }
        document.getElementById("emptyMsg").style.display = "none";
        snap.forEach((docSnap, index) => {
          const data = docSnap.data();
          const div = document.createElement("div");
          div.className = "photo-item fade-in";
          div.style.animationDelay = `${index * 0.1}s`;
          div.innerHTML = `
            <img src="${data.url.replace('/upload/', '/upload/c_fill,h_600,w_600,q_auto,f_auto/')}" onclick="showBig('${data.url}')">
            <div class="photo-buttons">
              <button class="btn-save" onclick="window.open('${data.url}', '_blank')">保存</button>
              ${currentUser && data.ownerId === currentUser.uid ? `<button class="btn-danger" onclick="deletePhoto('${docSnap.id}')">刪除</button>` : ''}
            </div>`;
          target.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    window.deletePhoto = async (id) => {
      if (confirm("刪除照片？")) {
        await deleteDoc(doc(db, "wedding_photos", id));
        loadGallery(document.body.classList.contains('viewing-all'));
      }
    };

    window.showBig = (url) => { document.getElementById("previewImage").src = url; document.getElementById("previewOverlay").style.display = "flex"; };
    document.getElementById("previewOverlay").onclick = () => document.getElementById("previewOverlay").style.display = "none";
    document.getElementById("viewAllBtn").onclick = () => { document.body.classList.add("viewing-all"); loadGallery(true); };
    document.getElementById("backBtn").onclick = () => { document.body.classList.remove("viewing-all"); loadGallery(false); };
  </script>
</body>
</html>
