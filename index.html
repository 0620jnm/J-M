<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Jay & Michelle Wedding Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #121212;        
      --card-bg: #1e1e1e;        
      --champagne-gold: #F7E7CE;  /* 香檳金 */
      --soft-gold: #D4AF37;       /* 點綴金 */
      --text-main: #f0f0f0;      
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    * {
      box-sizing: border-box;
      font-family: 'Noto Serif TC', serif;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-main);
      max-width: 600px; /* 3. 縮小整體框架寬度，手機版更精緻 */
      margin: 0 auto;
      padding: 20px 12px;
      animation: fadeInUp 1s ease-out forwards;
    }

    h1 { 
      text-align: center; 
      color: var(--champagne-gold);
      font-size: 1.8rem;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: var(--champagne-gold);
      opacity: 0.8;
      margin-bottom: 30px;
      letter-spacing: 4px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px; /* 3. 縮小內距 */
      margin-bottom: 20px;
      border: 1px solid var(--champagne-gold); 
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: fadeInUp 1s ease-out 0.2s backwards;
    }

    /* 統一按鈕與置中 */
    .btn-container {
      display: flex;
      flex-direction: column;
      align-items: center; /* 2. 確保按鈕置中 */
      width: 100%;
    }

    .btn-custom, button {
      display: block;
      width: 100%;
      max-width: 240px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      color: var(--bg-dark);
      background: var(--champagne-gold);
      border: 1px solid var(--champagne-gold);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin: 8px 0;
      text-align: center;
      text-decoration: none;
    }

    /* 點擊效果 */
    .btn-custom:active, button:active {
      transform: scale(0.97);
      box-shadow: 0 0 12px var(--champagne-gold);
    }

    #fileInput { display: none; }
    .file-label {
      background: transparent;
      color: var(--champagne-gold);
    }

    /* 4. 最新動態：統一正方形照片 */
    .gallery-preview {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 三張併排 */
      gap: 10px;
      margin-top: 15px;
    }

    .gallery-preview .photo-item img {
      width: 100%;
      aspect-ratio: 1 / 1; /* 強制正方形 */
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #333;
    }

    /* 全部相簿格線 */
    .gallery-full {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 全部照片時兩張一排 */
      gap: 12px;
    }

    .photo-item {
      animation: fadeInUp 0.6s ease-out;
      text-align: center;
    }

    .photo-item img {
      width: 100%;
      border-radius: 4px;
      cursor: zoom-in;
    }

    .photo-buttons { 
      display: flex; 
      gap: 5px; 
      margin-top: 5px; 
      justify-content: center;
    }

    .photo-buttons button {
      padding: 6px;
      font-size: 11px;
      max-width: 70px;
      margin: 0;
    }

    .btn-danger { background: #631d1d; border-color: #631d1d; color: white; }

    .status { font-size: 13px; color: var(--champagne-gold); text-align: center; margin-top: 8px; min-height: 18px; }

    /* 全相簿切換 */
    #allPhotosSection { display: none; }
    .viewing-all #mainUploadSection, .viewing-all #previewTitle, .viewing-all #viewAllBtn, .viewing-all #gallery { display: none; }
    .viewing-all #allPhotosSection { display: block; }

    #previewOverlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    #previewImage { max-width: 95%; max-height: 80%; border: 1px solid var(--champagne-gold); }
  </style>
</head>
<body>

  <h1>JAY & MICHELLE</h1>
  <div class="subtitle">WEDDING GALLERY</div>

  <div id="mainUploadSection" class="card">
    <div class="btn-container">
        <label for="fileInput" class="btn-custom file-label">＋ 選擇照片</label>
        <input id="fileInput" type="file" accept="image/*" multiple />
        <button id="uploadBtn">上傳分享幸福</button>
    </div>
    <div id="uploadStatus" class="status"></div>
  </div>

  <div class="card">
    <h3 id="previewTitle" style="text-align: center; color: var(--champagne-gold); font-size: 1rem; margin-top: 0;">LATEST MOMENTS</h3>
    
    <div id="gallery" class="gallery-preview"></div>
    
    <div class="btn-container">
        <button id="viewAllBtn" class="btn-custom" style="margin-top: 20px;">瀏覽所有照片</button>
    </div>

    <div id="allPhotosSection">
      <h3 style="text-align: center; color: var(--champagne-gold); font-size: 1rem;">ALL PHOTOS</h3>
      <div id="fullGallery" class="gallery-full"></div>
      <div class="btn-container">
          <button id="backBtn" class="btn-custom" style="background: transparent; color: var(--champagne-gold); margin-top: 30px;">返回上傳</button>
      </div>
    </div>

    <p id="emptyMsg" style="text-align:center; color:#555; display:none; font-size: 13px;">尚未有照片</p>
  </div>

  <div id="previewOverlay">
    <img id="previewImage" src="" alt="預覽">
  </div>

  <script type="module">
    const CLOUD_NAME    = "dclcbrfs8"; 
    const UPLOAD_PRESET = "wedding-photos"; 

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, deleteDoc, doc } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzK8lLQTr_Z3dn-TNOUslX1sAw3PV9TY0",
      authDomain: "wedding-ef203.firebaseapp.com",
      projectId: "wedding-ef203",
      storageBucket: "wedding-ef203.firebasestorage.app",
      messagingSenderId: "791365577253",
      appId: "1:791365577253:web:018970a9904007b3e8adcc",
      measurementId: "G-C086ETKN7J"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);
    const photosCol = collection(db, "wedding_photos");

    const gallery = document.getElementById("gallery");
    const fullGallery = document.getElementById("fullGallery");
    const viewAllBtn = document.getElementById("viewAllBtn");
    const backBtn = document.getElementById("backBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");

    let currentUser = null;

    viewAllBtn.onclick = () => {
      document.body.classList.add('viewing-all');
      loadGallery(true);
      window.scrollTo(0, 0);
    };
    backBtn.onclick = () => {
      document.body.classList.remove('viewing-all');
      loadGallery(false);
      window.scrollTo(0, 0);
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) { currentUser = user; await loadGallery(false); }
      else { await signInAnonymously(auth); }
    });

    function getDisplayUrl(url) {
      return url.replace('/upload/', '/upload/c_fill,h_600,w_600,q_auto,f_auto/');
    }

    async function loadGallery(isFull = false) {
      const targetGallery = isFull ? fullGallery : gallery;
      targetGallery.innerHTML = "";
      document.getElementById("emptyMsg").style.display = "none";

      try {
        const q = isFull 
          ? query(photosCol, orderBy("createdAt", "desc")) 
          : query(photosCol, orderBy("createdAt", "desc"), limit(3));
        
        const snap = await getDocs(q);
        if (snap.empty) { document.getElementById("emptyMsg").style.display = "block"; return; }

        snap.forEach(docSnap => {
          const data = docSnap.data();
          const div = document.createElement("div");
          div.className = "photo-item";
          div.innerHTML = `
            <img src="${getDisplayUrl(data.url)}" onclick="showPreview('${data.url.replace('/upload/', '/upload/q_auto,f_auto/')}')">
            <div class="photo-buttons">
              <button onclick="downloadImage('${data.url}', 'Wedding.jpg')">下載</button>
              ${currentUser && data.ownerId === currentUser.uid ? `<button class="btn-danger" onclick="deletePhoto('${docSnap.id}')">刪除</button>` : ''}
            </div>
          `;
          targetGallery.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    window.showPreview = (url) => {
      const overlay = document.getElementById("previewOverlay");
      const img = document.getElementById("previewImage");
      img.src = url;
      overlay.style.display = "flex";
    };

    document.getElementById("previewOverlay").onclick = function() { this.style.display = "none"; };

    window.downloadImage = async (url, filename) => {
      const res = await fetch(url, { mode: 'cors' });
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    };

    window.deletePhoto = async (id) => {
      if (confirm("確定刪除？")) {
        await deleteDoc(doc(db, "wedding_photos", id));
        loadGallery(document.body.classList.contains('viewing-all'));
      }
    };

    uploadBtn.onclick = async () => {
      const files = Array.from(fileInput.files);
      if (!files.length) return;
      uploadBtn.disabled = true;
      document.getElementById("uploadStatus").textContent = "正在傳送...";

      for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
        const result = await res.json();
        await addDoc(photosCol, { publicId: result.public_id, url: result.secure_url, ownerId: currentUser.uid, createdAt: serverTimestamp() });
      }
      document.getElementById("uploadStatus").textContent = "完成！";
      fileInput.value = "";
      uploadBtn.disabled = false;
      loadGallery(false);
    };
  </script>
</body>
</html>
