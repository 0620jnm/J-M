<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay & Michelle Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Serif+TC:wght@300;400&family=Gwendolyn:wght@400;700&display=swap" rel="stylesheet">
<style>
    /* --- 1. 專屬色號實作 --- */
    :root {
        --color-gold: #C9A466;    /* 金棕色 */
        --color-beige: #EBDDB5;   /* 淺米色 */
        --color-cream: #F7F6ED;   /* 奶油底色 */
        --color-light-green: #DDE7A9; /* 淺草綠 */
        --color-moss: #A6A35D;    /* 苔蘚綠 */
        --color-dark: #362e2b;    /* 深褐色 */
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Serif TC',serif; background: var(--color-cream); color: var(--color-dark); overflow-x:hidden}
    
    /* --- 2. 標題藝術美感 --- */
    .cover{height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 20px;}
    
    .wedding-title {
        display: flex; align-items: baseline; justify-content: center; gap: 12px; margin: 24px 0;
        font-family: 'Playfair Display', serif;
    }
    .name-j { font-size: clamp(3.5rem, 12vw, 6rem); color: var(--color-dark); font-weight: 300; }
    .name-m { font-size: clamp(2.8rem, 10vw, 5rem); color: var(--color-moss); font-weight: 300; }
    .amp { 
        font-family: 'Gwendolyn', cursive; /* 指定手寫字體 */
        font-size: 3rem; color: var(--color-gold); 
        transform: translateY(-8px); font-weight: 700;
    }

    section{padding:100px 24px; max-width:700px; margin:0 auto; text-align:center}
    h2{font-family:'Cormorant Garamond',serif; font-size:2.2rem; color: var(--color-gold); margin-bottom:24px; letter-spacing: 0.15em;}
    
    /* 資訊卡片色號協調 */
    .info-card {
        background: var(--color-beige); padding:40px 30px; margin:20px 0; 
        border: 1px solid var(--color-light-green); border-radius: 12px;
    }
    .info-card h3 { color: var(--color-moss); font-size: 0.9rem; letter-spacing: 0.4em; margin-bottom: 12px; text-transform: uppercase;}
    
    iframe{width:100%; height:350px; border:none; margin:24px 0; border-radius: 15px; background: var(--color-light-green);}
    
    /* 按鈕樣式 */
    .btn-main {
        display:inline-block; padding:14px 40px; background: var(--color-moss); color: white;
        text-decoration:none; border-radius: 30px; transition: 0.3s; border: none; cursor: pointer; font-size: 1.1rem; letter-spacing: 0.1em;
    }
    .btn-main:hover { background: var(--color-gold); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(201, 164, 102, 0.3); }

    input, select { 
        width: 100%; padding: 14px; margin: 10px 0; border: 1px solid var(--color-light-green); 
        background: white; border-radius: 8px; font-family: inherit;
    }

    /* --- 3. 全文字淡入特效 --- */
    .fade-item { 
        opacity: 0; transform: translateY(30px); 
        transition: opacity 1.2s ease-out, transform 1.2s ease-out; 
    }
    .fade-item.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="main-content">
    <div class="cover">
        <p class="fade-item" style="font-size:0.9rem; letter-spacing:0.5em; color: var(--color-moss); margin-bottom:10px">WE'RE GETTING MARRIED</p>
        <div class="wedding-title fade-item">
            <span class="name-j">Jay</span>
            <span class="amp">&</span>
            <span class="name-m">Michelle</span>
        </div>
        <p class="fade-item" style="color: var(--color-gold); letter-spacing: 4px; font-weight: 300;">2026.06.20</p>
    </div>

    <section>
        <h2 class="fade-item">誠摯邀請您</h2>
        <p class="fade-item" style="line-height:2.4; color: var(--color-dark); font-size: 1.05rem;">
            我們誠摯邀請您，一同見證我們的幸福時刻，<br>
            分享這份喜悅與愛。<br><br>
            愛情是一段奇妙的旅程，而今天，<br>
            我們即將啟航人生新的篇章。
        </p>
    </section>

    <section>
        <h2 class="fade-item">Wedding Info</h2>
        <div class="info-card fade-item">
            <h3>Date</h3>
            <p style="font-size:1.6rem; color: var(--color-dark); margin-bottom: 5px;">2026年6月20日</p>
            <p style="color: var(--color-moss); letter-spacing: 2px;">星期六 11:00 AM</p>
        </div>
        <div class="info-card fade-item">
            <h3>Venue</h3>
            <p style="line-height:1.8; font-size: 1.2rem;">暖居日穀<br>台中市北屯區松竹路一段3號</p>
        </div>
    </section>

    <section>
        <h2 class="fade-item">婚宴地點</h2>
        <div class="fade-item">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3640.1132644265545!2d120.709333315367!3d24.16773357861966!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x346917e29788f637%3A0xc6c7602e11894a4b!2z5pqq5bGF5pel56穀!5e0!3m2!1szh-TW!2stw!4v1678123456789" allowfullscreen="" loading="lazy"></iframe>
            <a href="https://goo.gl/maps/Q3Zz6mUj3vB2" target="_blank" class="btn-main">開啟 Google 地圖</a>
        </div>
    </section>

    <section style="background: var(--color-beige); max-width:100%; padding:100px 24px;">
        <div style="max-width:480px; margin:0 auto">
            <h2 class="fade-item">出席回覆</h2>
            <form id="rsvpForm" class="fade-item" style="margin-top:30px">
                <input type="text" placeholder="您的姓名" required>
                <div style="display:flex; gap:12px; margin:15px 0">
                    <button type="button" id="btn-attend" style="background: var(--color-gold); flex:1; color:white; border:none; padding:16px; border-radius: 8px; cursor:pointer; transition: 0.3s;" onclick="selectRSVP(true)">會出席</button>
                    <button type="button" id="btn-absent" style="background:#ccc; flex:1; color:white; border:none; padding:16px; border-radius: 8px; cursor:pointer; transition: 0.3s;" onclick="selectRSVP(false)">不克出席</button>
                </div>
                <button type="submit" class="btn-main" style="width:100%; border-radius: 8px; margin-top: 10px;">送出回覆</button>
            </form>
            <p id="msg" style="display:none; margin-top:25px; color: var(--color-moss); font-size: 1.3rem; font-weight: 400;">感謝您的回覆！期待見到您。</p>
        </div>
    </section>

    <footer class="fade-item" style="padding:80px 24px; font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-style:italic; color: var(--color-gold); text-align: center;">
        See You Soon
    </footer>
</div>

<div id="player" style="position:fixed;top:-9999px;left:-9999px;"></div>
<button id="musicToggle" style="position:fixed;bottom:25px;right:25px;width:55px;height:55px;border-radius:50%;background: var(--color-gold); border:none; color:white; font-size:24px; cursor:pointer; z-index:9999; box-shadow:0 4px 15px rgba(0,0,0,0.2);">▶</button>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // 滾動偵測淡入
    function handleScroll() {
        const items = document.querySelectorAll('.fade-item');
        items.forEach(el => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight * 0.92) {
                el.classList.add('show');
            }
        });
    }

    window.addEventListener('scroll', handleScroll);
    window.addEventListener('load', handleScroll); // 初始載入偵測

    // RSVP 選項切換
    function selectRSVP(isAttending) {
        const attendBtn = document.getElementById('btn-attend');
        const absentBtn = document.getElementById('btn-absent');
        if (isAttending) {
            attendBtn.style.background = 'var(--color-moss)';
            absentBtn.style.background = '#ccc';
        } else {
            absentBtn.style.background = 'var(--color-moss)';
            attendBtn.style.background = '#ccc';
        }
    }

    document.getElementById('rsvpForm').addEventListener('submit', function(e){
        e.preventDefault();
        this.style.opacity = '0';
        setTimeout(() => {
            this.style.display='none';
            const msg = document.getElementById('msg');
            msg.style.display='block';
            msg.classList.add('fade-item', 'show');
        }, 500);
    });

    // 音樂播放器邏輯
    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'pmrCXt4lNyA',
            playerVars: { 'autoplay': 1, 'loop': 1, 'playlist': 'pmrCXt4lNyA', 'controls': 0 },
            events: {
                'onReady': (e) => { e.target.setVolume(25); },
                'onStateChange': (e) => {
                    document.getElementById('musicToggle').innerHTML = (e.data == 1) ? '⏸' : '▶';
                }
            }
        });
    }
    document.getElementById('musicToggle').addEventListener('click', function() {
        if (player) player.getPlayerState() == 1 ? player.pauseVideo() : player.playVideo();
    });
</script>
</body>
</html>
