<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay & Michelle Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Serif+TC:wght@300;400&family=Monsieur+La+Doulaise&family=Gwendolyn:wght@400;700&display=swap" rel="stylesheet">
<style>
    /* --- 1. 色號系統實作 --- */
    :root {
        --color-gold: #C9A466;    /* 金棕色 */
        --color-beige: #EBDDB5;   /* 淺米色 */
        --color-cream: #F7F6ED;   /* 奶油底色 */
        --color-light-green: #DDE7A9; /* 淺草綠 */
        --color-dark-green: #A6A35D;  /* 苔蘚綠 */
        --color-dark: #362e2b;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Serif TC',serif;background: var(--color-cream); color: var(--color-dark); overflow-x:hidden}
    
    /* --- 2. 信封與木紋背景修復 --- */
    #envelope-wrapper {
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        /* 使用穩定的背景圖片載入方式 */
        background: #2a1f1a url('https://images.unsplash.com/photo-1541701494587-cb58502866ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        display: flex; align-items: center; justify-content: center;
        z-index: 10000; transition: opacity 1.2s ease; perspective: 1500px;
    }
    
    .envelope {
        position: relative; width: 320px; height: 220px; background: #fdfcf8;
        border-radius: 4px; cursor: pointer; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .flap {
        position: absolute; top: 0; width: 0; height: 0;
        border-left: 160px solid transparent; border-right: 160px solid transparent;
        border-top: 130px solid #f2ede4; transform-origin: top; transition: transform 0.8s ease; z-index: 3;
    }
    .wax-seal {
        position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
        width: 65px; height: 65px; background: #8e1e1e; border-radius: 50%; z-index: 10;
        display: flex; align-items: center; justify-content: center; transition: 0.5s;
    }
    .wax-seal::after { 
        content: "MJ"; font-family: 'Monsieur La Doulaise', cursive; color: rgba(255,255,255,0.4); font-size: 26px;
    }
    .open .flap { transform: rotateX(180deg); z-index: 1; }
    .open .wax-seal { opacity: 0; transform: translateX(-50%) scale(0.5); }

    /* --- 3. 標題與內文藝術設計 --- */
    .cover{height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background: var(--color-cream); text-align:center}
    
    .wedding-title {
        display: flex; align-items: baseline; justify-content: center; gap: 12px; margin: 20px 0;
        font-family: 'Playfair Display', serif;
    }
    .name-j { font-size: clamp(3.5rem, 12vw, 5.5rem); color: var(--color-dark); font-weight: 300; }
    .name-m { font-size: clamp(2.8rem, 10vw, 4.5rem); color: var(--color-dark-green); font-weight: 300; }
    .amp { 
        font-family: 'Gwendolyn', cursive; font-size: 3rem; color: var(--color-gold); 
        transform: translateY(-8px); font-weight: 700;
    }

    section{padding:80px 24px; max-width:700px; margin:0 auto; text-align:center}
    h2{font-family:'Cormorant Garamond',serif; font-size:2rem; color: var(--color-gold); margin-bottom:20px; letter-spacing: 0.1em;}
    
    .info-card {
        background: var(--color-beige); padding:30px; margin:20px 0; 
        border: 1px solid var(--color-light-green); border-radius: 12px;
        transition: transform 0.3s;
    }
    .info-card h3 { color: var(--color-dark-green); font-size: 0.8rem; letter-spacing: 0.3em; margin-bottom: 10px; }
    
    iframe{width:100%; height:320px; border:none; margin:20px 0; border-radius: 15px; background: var(--color-light-green);}
    
    .btn-main {
        display:inline-block; padding:12px 35px; background: var(--color-dark-green); color: white;
        text-decoration:none; border-radius: 25px; transition: 0.3s; border: none; cursor: pointer;
    }
    .btn-main:hover { background: var(--color-gold); transform: translateY(-2px); }

    /* --- 4. 全文字淡入效果 --- */
    #main-content { opacity: 0; visibility: hidden; transition: opacity 1.2s ease; }
    #main-content.reveal { opacity: 1; visibility: visible; }
    
    h1, h2, h3, p, .info-card, form, iframe, .btn-main, .wedding-title { 
        opacity: 0; transform: translateY(20px); 
        transition: opacity 1s ease-out, transform 1s ease-out; 
    }
    .show { opacity: 1 !important; transform: translateY(0) !important; }
</style>
</head>
<body>

<div id="envelope-wrapper">
    <div class="envelope" id="env" onclick="startOpen()">
        <div class="flap"></div>
        <div class="wax-seal"></div>
        <p style="position:absolute; bottom:-50px; left:50%; transform:translateX(-50%); color:white; letter-spacing:2px; font-size:12px; font-family:sans-serif;">TAP TO OPEN</p>
    </div>
</div>

<div id="main-content">
    <div class="cover">
        <p style="font-size:0.85rem; letter-spacing:0.4em; color: var(--color-dark-green); margin-bottom:10px">WE'RE GETTING MARRIED</p>
        <div class="wedding-title">
            <span class="name-j">Jay</span>
            <span class="amp">&</span>
            <span class="name-m">Michelle</span>
        </div>
        <p style="color: var(--color-gold)">2026·06·20</p>
    </div>

    <section>
        <h2>誠摯邀請您</h2>
        <p style="line-height:2.2; color: var(--color-dark-green);">
            我們誠摯邀請您，一同見證我們的幸福時刻，<br>
            分享這份喜悅與愛。<br><br>
            愛情是一段奇妙的旅程，而今天，<br>
            我們即將啟航人生新的篇章。
        </p>
    </section>

    <section>
        <h2>Wedding Info</h2>
        <div class="info-card">
            <h3>DATE</h3>
            <p style="font-size:1.5rem; color: var(--color-dark);">2026年6月20日</p>
        </div>
        <div class="info-card">
            <h3>VENUE</h3>
            <p style="line-height:1.8">暖居日穀<br>台中市北屯區松竹路一段3號</p>
        </div>
    </section>

    <section>
        <h2>婚宴地點</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3640.117462054236!2d120.7029!3d24.1678!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x346917f8b9e6e343%3A0x6b66b8b0e6c6b8b0!2z5pqW5bGF5pel56穀!5e0!3m2!1szh-TW!2stw!4v1700000000000" allowfullscreen="" loading="lazy"></iframe>
        <a href="https://maps.app.goo.gl/YourExactLink" target="_blank" class="btn-main">開啟 Google 地圖</a>
    </section>

    <section style="background: var(--color-beige); max-width:100%; padding:80px 24px">
        <div style="max-width:480px; margin:0 auto">
            <h2>出席回覆</h2>
            <form id="rsvpForm" style="margin-top:30px">
                <input type="text" placeholder="您的姓名" style="width:100%; padding:12px; margin:8px 0; border:1px solid var(--color-light-green); border-radius: 8px;" required>
                <div style="display:flex; gap:10px; margin:15px 0">
                    <button type="button" style="background: var(--color-gold); flex:1; color:white; border:none; padding:15px; border-radius: 8px; cursor:pointer;" onclick="this.style.background='var(--color-dark-green)';this.nextElementSibling.style.background='#ccc'">會出席</button>
                    <button type="button" style="background:#ccc; flex:1; color:white; border:none; padding:15px; border-radius: 8px; cursor:pointer;" onclick="this.style.background='var(--color-dark-green)';this.previousElementSibling.style.background='#ccc'">不克出席</button>
                </div>
                <button type="submit" class="btn-main" style="width:100%; border-radius: 8px;">送出回覆</button>
            </form>
            <p id="msg" style="display:none; margin-top:20px; color: var(--color-dark-green); font-size: 1.2rem;">感謝您的回覆！</p>
        </div>
    </section>

    <footer style="padding:60px 24px; font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-style:italic; color: var(--color-gold)">
        See You Soon
    </footer>
</div>

<script>
    function startOpen() {
        document.getElementById('env').classList.add('open');
        setTimeout(() => {
            document.getElementById('envelope-wrapper').style.opacity = '0';
            document.getElementById('main-content').classList.add('reveal');
            document.body.style.overflow = 'auto';
            handleScroll();
        }, 1200);
        setTimeout(() => { document.getElementById('envelope-wrapper').style.display = 'none'; }, 2400);
    }

    function handleScroll() {
        const selectors = ['h1', 'h2', 'h3', 'p', '.info-card', 'form', 'iframe', '.btn-main', '.wedding-title'];
        selectors.forEach(s => {
            document.querySelectorAll(s).forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.9) el.classList.add('show');
            });
        });
    }
    window.addEventListener('scroll', handleScroll);
</script>
</body>
</html>
