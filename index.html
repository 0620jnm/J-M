<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Jay & Michelle Wedding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <style>
    :root { --rose: #c5a391; --dark: #5a4d4a; }
    body { 
      margin: 0; background: #fdfbfb; color: var(--dark); font-family: 'Noto Serif TC', serif;
      display: flex; flex-direction: column; align-items: center; padding: 15px 10px;
    }
    .container { width: 100%; max-width: 400px; }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .header-section { text-align: center; margin-bottom: 20px; }
    h1 { color: var(--rose); font-family: 'Dancing Script', cursive; font-size: 2.2rem; margin: 0; }
    
    .card {
      background: rgba(255, 255, 255, 0.8); border-radius: 15px; padding: 12px; margin-bottom: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #fff;
    }

    /* 按鈕精簡 */
    .btn-v2 {
      width: 100%; max-width: 180px; height: 40px; border-radius: 20px; border: none;
      font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center;
      margin: 5px auto; transition: 0.2s; font-size: 14px;
    }
    .btn-main { background: linear-gradient(135deg, #c5a391, #b38d7a); color: #fff; }
    .btn-outline { background: #fff; color: var(--rose); border: 1px solid var(--rose); }

    /* 縮圖區 */
    .preview-scroll { 
      display: flex; gap: 8px; overflow-x: auto; width: 100%;
      scrollbar-width: none; transition: 0.3s;
    }
    .preview-scroll:not(.active) { display: none; }
    .preview-item { position: relative; flex: 0 0 60px; height: 60px; border-radius: 6px; overflow: hidden; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .rm-btn { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; padding: 2px 5px; }

    /* 相簿格 */
    .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 10px 0; }
    .gallery-full { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .photo-box { border-radius: 6px; overflow: hidden; background: #eee; position: relative; }
    .photo-box img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
    .photo-btns { display: flex; gap: 2px; padding: 3px; }
    .photo-btns button { flex: 1; font-size: 9px; padding: 4px 0; border: none; border-radius: 4px; color: #fff; }

    #allPhotosSection { display: none; width: 100%; }
    .viewing-all #mainUploadSection, .viewing-all #previewTitle, .viewing-all #viewAllBtn, .viewing-all #gallery { display: none; }
    .viewing-all #allPhotosSection { display: block; }

    .status { font-size: 11px; color: var(--rose); text-align: center; height: 15px; margin-bottom: 5px; }
    #previewOverlay { position: fixed; inset:0; background: rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:99; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-section">
      <h1>Jay & Michelle</h1>
      <div style="font-size:0.6rem; letter-spacing:2px;">WEDDING GALLERY</div>
    </div>

    <div id="mainUploadSection" class="card fade-in">
      <div class="status" id="uploadStatus"></div>
      <label for="fileInput" class="btn-v2 btn-outline">選擇相片</label>
      <input id="fileInput" type="file" accept="image/*" multiple style="display:none">
      <div id="previewContainer" class="preview-scroll"></div>
      <button id="uploadBtn" class="btn-v2 btn-main" style="margin-top:10px">開始上傳</button>
    </div>

    <div class="card fade-in">
      <h3 id="previewTitle" style="text-align:center; font-size:0.8rem; color:var(--rose)">LATEST</h3>
      <div id="gallery" class="gallery"></div>
      <button id="viewAllBtn" class="btn-v2 btn-main">瀏覽所有照片</button>

      <div id="allPhotosSection">
        <button class="btn-v2 btn-outline backAction">返回</button>
        <div id="fullGallery" class="gallery gallery-full"></div>
        <button id="loadMoreBtn" class="btn-v2 btn-outline" style="display:none">載入更多</button>
        <button class="btn-v2 btn-outline backAction">返回</button>
      </div>
    </div>
  </div>

  <div id="previewOverlay" onclick="this.style.display='none'"><img id="previewImage" style="max-width:95%; max-height:90%"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, startAfter } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    const config = { apiKey: "AIzaSyAUFF7GdX7fAtK_wK5-YAffirtap52UgCg", authDomain: "wedding-e6351.firebaseapp.com", projectId: "wedding-e6351", storageBucket: "wedding-e6351.firebasestorage.app", messagingSenderId: "382633819825", appId: "1:382633819825:web:b1dd463dd466752f78ec90" };
    const app = initializeApp(config), db = getFirestore(app), auth = getAuth(app), photosCol = collection(db, "wedding_photos");
    let selectedFiles = [], lastDoc = null, currentUser = null;

    signInAnonymously(auth).then(cred => { currentUser = cred.user; loadGallery(); });

    // 圖片壓縮顯示邏輯
    document.getElementById("fileInput").onchange = (e) => {
      const files = Array.from(e.target.files);
      if(!files.length) return;
      const container = document.getElementById("previewContainer");
      container.classList.add('active');
      files.forEach(file => {
        selectedFiles.push(file);
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            canvas.getContext('2d').drawImage(img, 0, 0, 100, 100);
            const div = document.createElement("div");
            div.className = "preview-item";
            div.innerHTML = `<img src="${canvas.toDataURL('image/jpeg', 0.5)}"><div class="rm-btn">✕</div>`;
            div.onclick = () => { div.remove(); selectedFiles = selectedFiles.filter(f => f !== file); };
            container.appendChild(div);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    document.getElementById("uploadBtn").onclick = async () => {
      if(!selectedFiles.length) return;
      const btn = document.getElementById("uploadBtn"), status = document.getElementById("uploadStatus");
      btn.disabled = true;
      const total = selectedFiles.length;
      for(let i=0; i<total; i++){
        status.textContent = `上傳中 ${i+1}/${total}`;
        const fd = new FormData(); fd.append("file", selectedFiles[i]); fd.append("upload_preset", "wedding-photos");
        try {
          const res = await fetch(`https://api.cloudinary.com/v1_1/dfcbhdvq8/upload`, { method: "POST", body: fd });
          const data = await res.json();
          await addDoc(photosCol, { url: data.secure_url, uid: currentUser.uid, createdAt: serverTimestamp() });
        } catch(e) {}
      }
      status.textContent = `成功上傳 ${total} 張照片，謝謝分享！`;
      selectedFiles = []; document.getElementById("previewContainer").innerHTML = "";
      setTimeout(() => { status.textContent = ""; btn.disabled = false; loadGallery(); }, 3000);
    };

    async function loadGallery(append = false) {
      const isFull = document.body.classList.contains('viewing-all');
      const target = isFull ? document.getElementById("fullGallery") : document.getElementById("gallery");
      if(!append) target.innerHTML = "";
      
      let q = query(photosCol, orderBy("createdAt", "desc"), limit(isFull ? 12 : 3));
      if(append && lastDoc) q = query(photosCol, orderBy("createdAt", "desc"), startAfter(lastDoc), limit(12));
      
      const snap = await getDocs(q);
      lastDoc = snap.docs[snap.docs.length - 1];
      document.getElementById("loadMoreBtn").style.display = snap.docs.length === 12 ? "block" : "none";

      snap.forEach(d => {
        const url = d.data().url;
        // 使用 Cloudinary 的 f_auto,q_auto 優化，自動壓縮下載流量
        const thumb = url.replace('/upload/', '/upload/c_thumb,w_400,g_face,f_auto,q_auto/');
        const div = document.createElement("div");
        div.className = "photo-box fade-in";
        div.innerHTML = `<img src="${thumb}" onclick="showBig('${url}')"><div class="photo-btns"><button style="background:var(--rose)" onclick="window.open('${url}')">保存</button></div>`;
        target.appendChild(div);
      });
    }

    window.showBig = (u) => { document.getElementById("previewImage").src = u; document.getElementById("previewOverlay").style.display = "flex"; };
    document.getElementById("viewAllBtn").onclick = () => { document.body.classList.add("viewing-all"); lastDoc = null; loadGallery(); };
    document.querySelectorAll(".backAction").forEach(b => b.onclick = () => { document.body.classList.remove("viewing-all"); window.scrollTo(0,0); });
    document.getElementById("loadMoreBtn").onclick = () => loadGallery(true);
  </script>
</body>
</html>
