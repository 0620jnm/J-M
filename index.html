<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay & Michelle Wedding</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Serif+TC:wght@300;400&family=Monsieur+La+Doulaise&family=Gwendolyn:wght@400;700&display=swap" rel="stylesheet">
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Serif TC',serif;background:#faf8f5;color:#2c2c2c;overflow-x:hidden}
    
    .cover{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#f5f5dc,#e8dcc4);text-align:center}
    
    /* --- 標題藝術美化 --- */
    .wedding-title {
        font-family: 'Playfair Display', serif;
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 15px;
        margin: 20px 0;
    }
    .name-j { font-size: clamp(3.5rem, 12vw, 6rem); font-weight: 300; }
    .name-m { font-size: clamp(2.8rem, 10vw, 5rem); font-weight: 300; }
    .amp { 
        font-family: 'Gwendolyn', cursive; 
        font-size: 3rem; 
        color: #c9a96e; 
        transform: translateY(-5px); /* 讓 & 稍微偏上更有設計感 */
    }

    .cover p{margin-top:10px;letter-spacing:0.35em;color:#888}
    section{padding:80px 24px;max-width:700px;margin:0 auto;text-align:center}
    h2{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:#c9a96e;margin-bottom:20px}
    
    .info{background:#fff;padding:30px;margin:20px 0;border:1px solid #e0d9d0; border-radius: 12px;}
    iframe{width:100%;height:320px;border:none;margin:20px 0; border-radius: 15px; background:#eee;}
    
    /* 深色按鈕 */
    .map-btn, .submit-btn {
        display:inline-block; margin-top:15px; padding:12px 30px; 
        background:#362e2b; color:#ffffff; 
        text-decoration:none; letter-spacing:0.2em; border-radius: 25px;
        transition: background 0.3s; border:none; cursor:pointer;
    }
    .map-btn:hover { background: #5d4037; }

    /* 信封動畫 */
    #envelope-wrapper {
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        background: #2a1f1a; display: flex; align-items: center; justify-content: center;
        z-index: 10000; transition: opacity 1.2s ease; perspective: 1500px;
    }
    .envelope {
        position: relative; width: 320px; height: 220px; background: #fdfcf8;
        border-radius: 4px; cursor: pointer; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .flap {
        position: absolute; top: 0; width: 0; height: 0;
        border-left: 160px solid transparent; border-right: 160px solid transparent;
        border-top: 130px solid #f2ede4; transform-origin: top; transition: transform 0.8s ease; z-index: 3;
    }
    .wax-seal {
        position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
        width: 65px; height: 65px; background: #8e1e1e; border-radius: 50%; z-index: 10;
        display: flex; align-items: center; justify-content: center; transition: 0.5s;
    }
    .wax-seal::after { 
        content: "MJ"; font-family: 'Monsieur La Doulaise', cursive; color: rgba(255,255,255,0.4); font-size: 26px;
    }
    .open .flap { transform: rotateX(180deg); z-index: 1; }
    .open .wax-seal { opacity: 0; transform: translateX(-50%) scale(0.5); }

    /* --- 全文字淡入效果 --- */
    #main-content { opacity: 0; visibility: hidden; transition: opacity 1s ease; }
    #main-content.reveal { opacity: 1; visibility: visible; }
    
    h1, h2, h3, p, .info, form, iframe, .map-btn, .wedding-title { 
        opacity: 0; transform: translateY(20px); 
        transition: opacity 1s ease-out, transform 1s ease-out; 
    }
    .show { opacity: 1 !important; transform: translateY(0) !important; }
</style>
</head>
<body>

<div id="envelope-wrapper">
    <div class="envelope" id="env" onclick="startOpen()">
        <div class="flap"></div>
        <div class="wax-seal"></div>
        <p style="position:absolute; bottom:-50px; left:50%; transform:translateX(-50%); color:#c9a96e; letter-spacing:2px; font-size:12px;">TAP TO OPEN</p>
    </div>
</div>

<div id="main-content">
    <div class="cover">
        <p style="font-size:0.85rem;letter-spacing:0.35em;color:#c9a96e;margin-bottom:10px">WE'RE GETTING MARRIED</p>
        
        <div class="wedding-title">
            <span class="name-j">Jay</span>
            <span class="amp">&</span>
            <span class="name-m">Michelle</span>
        </div>
        
        <p>2026·06·20</p>
    </div>

    <section>
        <h2>誠摯邀請您</h2>
        <p style="line-height:2">我們誠摯邀請您，一同見證我們的幸福時刻，分享這份喜悅與愛。<br><br>
        愛情是一段奇妙的旅程，而今天，我們即將啟航人生新的篇章。<br>
        謝謝你一直以來的支持與陪伴，你的到來將使這個特別的日子更加完美。</p>
    </section>

    <section>
        <h2>Wedding Info</h2>
        <div class="info">
            <h3 style="color:#c9a96e;font-size:0.8rem;letter-spacing:0.3em;margin-bottom:10px">日期</h3>
            <p style="font-size:1.5rem">2026年6月20日</p>
        </div>
        <div class="info">
            <h3 style="color:#c9a96e;font-size:0.8rem;letter-spacing:0.3em;margin-bottom:10px">地點</h3>
            <p>暖居日穀<br>台中市北屯區松竹路一段3號</p>
        </div>
    </section>

    <section>
        <h2>婚宴地點</h2>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3639.467406987157!2d120.7061324!3d24.1729019!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x346917865f375555%3A0x6b77c5d5a6c0c6c0!2z5pqW5bGF5pel56穀!5e0!3m2!1szh-TW!2stw!4v170000000000034" allowfullscreen="" loading="lazy"></iframe>
        <a href="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3639.467406987157!2d120.7061324!3d24.1729019!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x346917865f375555%3A0x6b77c5d5a6c0c6c0!2z5pqW5bGF5pel56穀!5e0!3m2!1szh-TW!2stw!4v170000000000035" target="_blank" class="map-btn">開啟 Google 地圖</a>
    </section>

    <section style="background:#fff;max-width:100%;padding:80px 24px">
        <div style="max-width:480px;margin:0 auto">
            <h2>出席回覆</h2>
            <form id="rsvpForm" style="margin-top:30px">
                <input type="text" placeholder="您的姓名" required>
                <div style="display:flex;gap:10px;margin:10px 0">
                    <button type="button" style="background:#c9a96e; flex:1; border-radius: 8px; color:white; padding:15px; cursor:pointer; border:none;" onclick="this.style.background='#c9a96e';this.nextElementSibling.style.background='#ccc'">我會出席</button>
                    <button type="button" style="background:#ccc; flex:1; border-radius: 8px; color:white; padding:15px; cursor:pointer; border:none;" onclick="this.style.background='#c9a96e';this.previousElementSibling.style.background='#ccc'">無法出席</button>
                </div>
                <button type="submit" class="submit-btn" style="width:100%">送出回覆</button>
            </form>
            <p id="msg" style="display:none;margin-top:20px;color:#c9a96e;font-size:1.2rem">感謝您的回覆！</p>
        </div>
    </section>

    <footer style="text-align:center;padding:60px 24px;font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-style:italic;color:#c9a96e">
        See You Soon
    </footer>
</div>

<script>
    function startOpen() {
        document.getElementById('env').classList.add('open');
        setTimeout(() => {
            document.getElementById('envelope-wrapper').style.opacity = '0';
            document.getElementById('main-content').classList.add('reveal');
            document.body.style.overflow = 'auto';
            handleScroll();
        }, 1500);
        setTimeout(() => {
            document.getElementById('envelope-wrapper').style.display = 'none';
        }, 2700);
    }

    function handleScroll() {
        const selectors = ['h1', 'h2', 'h3', 'p', '.info', 'form', 'iframe', '.map-btn', '.wedding-title'];
        selectors.forEach(s => {
            document.querySelectorAll(s).forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.95) {
                    el.classList.add('show');
                }
            });
        });
    }

    window.addEventListener('scroll', handleScroll);
</script>
</body>
</html>
