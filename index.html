<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Jay & Michelle Wedding Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #a78b71;
      --secondary-color: #e8dcd4;
      --accent-color: #8da399;
      --bg-color: #f9f7f5;
      --text-color: #5a4a42;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body {
      font-family: 'Noto Serif TC', serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
      background: var(--bg-color);
      color: var(--text-color);
      line-height: 1.6;
      opacity: 0;
      animation: fadeInUp 1.2s ease-out forwards;
    }

    h1 { 
      text-align: center; 
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      color: var(--primary-color);
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    
    .subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #9e918a;
      margin-bottom: 40px;
      letter-spacing: 4px;
    }

    .card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(167, 139, 113, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      animation: fadeInUp 1s ease-out 0.3s backwards;
    }

    .upload-area { text-align: center; border: 2px dashed var(--secondary-color); }
    
    /* 大按鈕樣式 */
    .btn-large {
      display: block;
      width: 80%;
      max-width: 300px;
      margin: 20px auto;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #a78b71 0%, #8d7661 100%);
      color: white;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(167, 139, 113, 0.3);
      transition: all 0.3s ease;
    }

    .btn-large:active { transform: scale(0.95); opacity: 0.9; }

    button {
      border: none;
      border-radius: 50px;
      padding: 12px 28px;
      font-family: 'Noto Serif TC', serif;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary { background: var(--primary-color); color: #fff; }
    .btn-download { background: var(--accent-color); color: #fff; padding: 6px 14px; font-size: 12px; }
    .btn-danger { background: #f4b0b0; color: #fff; padding: 6px 14px; font-size: 12px; }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .photo-item {
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      padding: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      animation: fadeInUp 0.8s ease-out;
    }

    .photo-item img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
      cursor: zoom-in;
    }

    .photo-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
    .status { font-size: 14px; color: var(--primary-color); text-align: center; margin-top: 15px; min-height: 20px; }

    /* 預覽與全相簿模式控制 */
    #allPhotosSection { display: none; }
    .viewing-all #mainUploadSection, .viewing-all #previewTitle, .viewing-all #viewAllBtn { display: none; }
    .viewing-all #allPhotosSection { display: block; }

    #previewOverlay {
      position: fixed; inset: 0; background: rgba(45, 38, 34, 0.95);
      display: none; align-items: center; justify-content: center; z-index: 9999;
    }
    #previewImage { max-width: 90%; max-height: 90%; border: 5px solid #fff; border-radius: 4px; }
  </style>
</head>
<body>

  <h1>Jay & Michelle</h1>
  <div class="subtitle">WEDDING DAY</div>

  <div id="mainUploadSection" class="card upload-area">
    <input id="fileInput" type="file" accept="image/*" multiple />
    <br />
    <button id="uploadBtn" class="btn-primary">分享我們的喜悅</button>
    <div id="uploadStatus" class="status"></div>
  </div>

  <div class="card">
    <h3 id="previewTitle" style="text-align: center; color: var(--primary-color); margin-top: 0; font-weight: 500;">最新幸福瞬間</h3>
    <div id="gallery" class="gallery"></div>
    
    <button id="viewAllBtn" class="btn-large">瀏覽 & 下載所有照片</button>

    <div id="allPhotosSection">
      <h3 style="text-align: center; color: var(--primary-color); margin-top: 0;">所有賓客的祝福</h3>
      <div id="fullGallery" class="gallery"></div>
      <button id="backBtn" class="btn-large" style="background: #9e918a; margin-top: 40px;">回上傳頁面</button>
    </div>

    <p id="emptyMsg" style="text-align:center; color:#bbb; display:none; font-style: italic;">期待您的第一張照片...</p>
  </div>

  <div id="previewOverlay">
    <img id="previewImage" src="" alt="預覽">
  </div>

  <script type="module">
    // Firebase & Cloudinary 設定
    const CLOUD_NAME    = "dclcbrfs8"; 
    const UPLOAD_PRESET = "wedding-photos"; 

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, deleteDoc } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } 
      from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBzK8lLQTr_Z3dn-TNOUslX1sAw3PV9TY0",
      authDomain: "wedding-ef203.firebaseapp.com",
      projectId: "wedding-ef203",
      storageBucket: "wedding-ef203.firebasestorage.app",
      messagingSenderId: "791365577253",
      appId: "1:791365577253:web:018970a9904007b3e8adcc",
      measurementId: "G-C086ETKN7J"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    const auth = getAuth(app);
    const photosCol = collection(db, "wedding_photos");

    const gallery = document.getElementById("gallery");
    const fullGallery = document.getElementById("fullGallery");
    const viewAllBtn = document.getElementById("viewAllBtn");
    const backBtn = document.getElementById("backBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");

    let currentUser = null;

    // 介面切換邏輯
    viewAllBtn.onclick = () => {
      document.body.classList.add('viewing-all');
      loadGallery(true); // 載入全部
      window.scrollTo(0, 0);
    };
    backBtn.onclick = () => {
      document.body.classList.remove('viewing-all');
      loadGallery(false); // 回到三張
      window.scrollTo(0, 0);
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) { currentUser = user; await loadGallery(false); }
      else { await signInAnonymously(auth); }
    });

    function getDisplayUrl(url) {
      return url.replace('/upload/', '/upload/c_scale,w_800,q_auto,f_auto/');
    }

    async function downloadImage(url, filename) {
      try {
        const res = await fetch(url, { mode: 'cors' });
        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
      } catch (e) { alert("下載失敗，請長按圖片儲存。"); }
    }

    async function loadGallery(isFull = false) {
      const targetGallery = isFull ? fullGallery : gallery;
      targetGallery.innerHTML = "";
      document.getElementById("emptyMsg").style.display = "none";

      try {
        const q = isFull 
          ? query(photosCol, orderBy("createdAt", "desc")) 
          : query(photosCol, orderBy("createdAt", "desc"), limit(3));
        
        const snap = await getDocs(q);
        if (snap.empty) { document.getElementById("emptyMsg").style.display = "block"; return; }

        snap.forEach(docSnap => {
          const data = docSnap.data();
          const div = document.createElement("div");
          div.className = "photo-item";
          div.innerHTML = `
            <img src="${getDisplayUrl(data.url)}" onclick="showPreview('${getDisplayUrl(data.url)}')">
            <div class="photo-buttons">
              <button class="btn-download" onclick="downloadImage('${data.url}', 'Wedding_${data.publicId}.jpg')">下載原圖</button>
              ${currentUser && data.ownerId === currentUser.uid ? `<button class="btn-danger" onclick="deletePhoto('${docSnap.id}')">刪除</button>` : ''}
            </div>
          `;
          targetGallery.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    // 全域函式處理動態產生的 HTML
    window.showPreview = (url) => {
      const overlay = document.getElementById("previewOverlay");
      const img = document.getElementById("previewImage");
      img.src = url;
      overlay.style.display = "flex";
    };

    document.getElementById("previewOverlay").onclick = function() { this.style.display = "none"; };

    window.downloadImage = downloadImage;

    window.deletePhoto = async (id) => {
      if (confirm("要刪除照片嗎？")) {
        await deleteDoc(doc(db, "wedding_photos", id));
        loadGallery(document.body.classList.contains('viewing-all'));
      }
    };

    // 上傳邏輯
    uploadBtn.onclick = async () => {
      const files = Array.from(fileInput.files);
      if (!files.length || !currentUser) return;
      uploadBtn.disabled = true;
      document.getElementById("uploadStatus").textContent = "正在傳送幸福...";

      for (const file of files) {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
        const result = await res.json();
        await addDoc(photosCol, { publicId: result.public_id, url: result.secure_url, ownerId: currentUser.uid, createdAt: serverTimestamp() });
      }
      document.getElementById("uploadStatus").textContent = "上傳成功！";
      fileInput.value = "";
      uploadBtn.disabled = false;
      loadGallery(false);
    };
  </script>
</body>
</html>
