<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Jay & Michelle Wedding Photos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Dancing+Script:wght@600&family=Imperial+Script&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-gold: #c5a391;
      --champagne: #f7e7ce;
      --soft-pink: #f5e3e0;
      --text-dark: #5a4d4a;
      --danger-red: #d9534f;
      --grey-x: #999;
    }

    /* --- 淡入動畫 --- */
    @keyframes smoothFadeIn {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      opacity: 0;
      will-change: opacity, transform;
      animation: smoothFadeIn 1.2s cubic-bezier(0.33, 1, 0.68, 1) forwards;
    }
    .delay-header { animation-delay: 0.2s; }
    .delay-card-1 { animation-delay: 0.5s; }
    .delay-card-2 { animation-delay: 0.8s; }

    body {
      margin: 0; min-height: 100vh;
      background-color: #fdfbfb;
      background-image: 
        radial-gradient(at 0% 0%, rgba(245, 227, 224, 0.6) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(247, 231, 206, 0.6) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(247, 231, 206, 0.4) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text-dark);
      font-family: 'Noto Serif TC', serif;
      display: flex; flex-direction: column; align-items: center; padding: 20px 10px;
    }

    .container { width: 100%; max-width: 400px; }

    /* --- 標題與 Welcome (保持位置) --- */
    .header-section {
      text-align: center;
      position: relative;
      margin-bottom: 25px;
      padding: 15px 0;
    }
    h1 { color: var(--rose-gold); font-family: 'Dancing Script', cursive; font-size: 2.6rem; margin: 0; position: relative; z-index: 2; }
    .subtitle { font-size: 0.7rem; color: var(--rose-gold); margin: 0; letter-spacing: 3px; font-weight: 700; position: relative; z-index: 2; }
    .header-section::after {
      content: "Welcome";
      font-family: 'Imperial Script', cursive;
      font-size: 8.5rem;
      color: rgba(197, 163, 145, 0.18);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%); 
      z-index: 1; pointer-events: none; white-space: nowrap;
    }

    .card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 18px; padding: 14px; margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 20px rgba(109, 93, 90, 0.04);
      position: relative;
    }

    .btn-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
    
    .btn-custom, button {
      width: 100%; max-width: 200px; padding: 10px 16px; 
      font-family: 'Noto Serif TC', serif;
      font-size: 14px; font-weight: 700; letter-spacing: 1px; 
      border-radius: 22px; cursor: pointer; 
      margin: 5px 0;
      display: flex; align-items: center; justify-content: center;
      border: none;
      transition: transform 0.1s ease; 
    }

    /* 點擊壓感特效 */
    .btn-custom:active, button:active {
      transform: scale(0.96);
    }

    #uploadBtn, #viewAllBtn {
      color: white; 
      background: linear-gradient(135deg, #c5a391 0%, #b38d7a 100%);
      box-shadow: 0 3px 10px rgba(197, 163, 145, 0.15);
    }

    .file-label, #backBtn {
      background: white !important; 
      color: var(--rose-gold) !important;
      border: 1.2px solid var(--rose-gold) !important; 
    }

    /* --- 照片展示區 --- */
    .gallery-preview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 10px 0; }
    .photo-item { border-radius: 8px; overflow: hidden; background: rgba(255,255,255,0.3); transition: transform 0.1s ease; }
    .photo-item:active { transform: scale(0.96); }
    .photo-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; cursor: pointer; display: block; }
    
    .photo-buttons { display: flex; gap: 4px; padding: 4px; justify-content: center; }
    .photo-buttons button { 
      padding: 3px; font-size: 8px; margin: 0; max-width: 45px; border-radius: 12px; color: white !important; 
    }
    /* 保持顏色 */
    .btn-save { background: var(--rose-gold) !important; }
    .btn-danger { background: var(--danger-red) !important; }

    #fileInput { display: none; }
    #selectionInfo { font-size: 12px; color: var(--rose-gold); margin: 5px 0; font-weight: 700; display: none; }
    .preview-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 8px 2px; width: 100%; scrollbar-width: none; }
    .preview-item { position: relative; flex-shrink: 0; width: 65px; height: 65px; }
    .preview-thumb { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; border: 1.5px solid white; }
    .remove-btn { position: absolute; top: -5px; right: -5px; background: #eee; color: var(--grey-x); border: 1px solid white; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .progress-wrap { width: 100%; max-width: 200px; height: 4px; background: #eee; border-radius: 10px; margin: 6px 0; display: none; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: var(--rose-gold); transition: width 0.3s; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loading-icon { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(197,163,145,0.3); border-top-color: var(--rose-gold); border-radius: 50%; animation: spin 1s linear infinite; margin-right: 5px; vertical-align: middle; }
    .gallery-full { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .status { font-size: 12px; color: var(--rose-gold); text-align: center; margin-top: 6px; font-weight: 700; min-height: 1.2em; }
    #allPhotosSection { display: none; }
    .viewing-all #mainUploadSection, .viewing-all #previewTitle, .viewing-all #viewAllBtn, .viewing-all #gallery { display: none; }
    .viewing-all #allPhotosSection { display: block; }
    #previewOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; align-items: center; justify-content: center; z-index: 9999; }
    #previewImage { max-width: 94%; max-height: 80%; border-radius: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-section fade-in delay-header">
      <h1>Jay & Michelle</h1>
      <div class="subtitle">WEDDING GALLERY</div>
    </div>

    <div id="mainUploadSection" class="card fade-in delay-card-1">
      <div class="btn-container">
          <label for="fileInput" class="btn-custom file-label">選擇相片</label>
          <input id="fileInput" type="file" accept="image/*" multiple />
          <div id="selectionInfo">已選取 0 張照片</div>
          <div id="previewContainer" class="preview-scroll"></div>
          <button id="uploadBtn">開始上傳</button>
          <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
      </div>
      <div id="uploadStatus" class="status"></div>
    </div>

    <div class="card fade-in delay-card-2">
      <h3 id="previewTitle" style="text-align: center; color: var(--rose-gold); font-size: 0.85rem; margin-top: 0; letter-spacing: 2px;">LATEST</h3>
      <div id="gallery" class="gallery-preview"></div>
      <div class="btn-container">
          <button id="viewAllBtn">瀏覽所有照片</button>
      </div>

      <div id="allPhotosSection">
        <h3 style="text-align: center; color: var(--rose-gold); font-size: 0.85rem;">ALL MEMORIES</h3>
        <div id="fullGallery" class="gallery-full"></div>
        <div class="btn-container">
            <button id="backBtn" class="btn-custom file-label">返回</button>
        </div>
      </div>
      <p id="emptyMsg" style="text-align:center; color:#b5a6a3; display:none; font-size: 12px;">尚無照片</p>
    </div>
  </div>

  <div id="previewOverlay"><img id="previewImage" src=""></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    const CLOUD_NAME = "dfcbhdvq8";
    const UPLOAD_PRESET = "wedding-photos";
    const firebaseConfig = {
      apiKey: "AIzaSyAUFF7GdX7fAtK_wK5-YAffirtap52UgCg",
      authDomain: "wedding-e6351.firebaseapp.com",
      projectId: "wedding-e6351",
      storageBucket: "wedding-e6351.firebasestorage.app",
      messagingSenderId: "382633819825",
      appId: "1:382633819825:web:b1dd463dd466752f78ec90",
      measurementId: "G-HGV3JZ9Z8E"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const photosCol = collection(db, "wedding_photos");

    const gallery = document.getElementById("gallery");
    const fullGallery = document.getElementById("fullGallery");
    const viewAllBtn = document.getElementById("viewAllBtn");
    const backBtn = document.getElementById("backBtn");
    const uploadBtn = document.getElementById("uploadBtn");
    const fileInput = document.getElementById("fileInput");
    const uploadStatus = document.getElementById("uploadStatus");
    const selectionInfo = document.getElementById("selectionInfo");
    const previewContainer = document.getElementById("previewContainer");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");

    let currentUser = null;
    let selectedFiles = []; 

    onAuthStateChanged(auth, async (user) => {
      if (user) { currentUser = user; await loadGallery(false); }
      else { await signInAnonymously(auth); }
    });

    viewAllBtn.onclick = () => { document.body.classList.add('viewing-all'); loadGallery(true); };
    backBtn.onclick = () => { document.body.classList.remove('viewing-all'); loadGallery(false); };

    fileInput.onchange = (e) => {
      selectedFiles = [...selectedFiles, ...Array.from(e.target.files)];
      renderPreviews();
      fileInput.value = ""; 
    };

    function renderPreviews() {
      previewContainer.innerHTML = "";
      if (selectedFiles.length > 0) {
        selectionInfo.style.display = "block";
        selectionInfo.textContent = `已選取 ${selectedFiles.length} 張照片`;
        selectedFiles.forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const wrapper = document.createElement("div");
            wrapper.className = "preview-item";
            wrapper.innerHTML = `
              <img src="${e.target.result}" class="preview-thumb">
              <div class="remove-btn" onclick="removeSelected(${index})">✕</div>
            `;
            previewContainer.appendChild(wrapper);
          };
          reader.readAsDataURL(file);
        });
      } else { selectionInfo.style.display = "none"; }
    }

    window.removeSelected = (index) => {
      selectedFiles.splice(index, 1);
      renderPreviews();
    };

    uploadBtn.onclick = async () => {
      if (!selectedFiles.length) { alert("請先選擇照片"); return; }
      uploadBtn.disabled = true;
      progressWrap.style.display = "block";
      progressBar.style.width = "0%";
      let successCount = 0;
      const total = selectedFiles.length;

      for (let i = 0; i < total; i++) {
        uploadStatus.innerHTML = `<span class="loading-icon"></span>傳送中 (${i+1}/${total})...`;
        try {
          const formData = new FormData();
          formData.append("file", selectedFiles[i]);
          formData.append("upload_preset", UPLOAD_PRESET);
          const res = await fetch(`https://api.api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
          const data = await res.json();
          await addDoc(photosCol, {
            url: data.secure_url,
            ownerId: currentUser.uid,
            createdAt: serverTimestamp()
          });
          successCount++;
        } catch (e) { console.error(e); }
        progressBar.style.width = `${((i + 1) / total) * 100}%`;
      }
      progressWrap.style.display = "none";
      uploadStatus.innerHTML = "✅ 上傳成功！";
      selectedFiles = [];
      renderPreviews();
      setTimeout(() => { uploadBtn.disabled = false; uploadStatus.innerHTML = ""; }, 5000);
      
      // 上傳成功後，重新呼叫 loadGallery 更新最新照片
      await loadGallery(false);
    };

    function getDisplayUrl(url) { return url.replace('/upload/', '/upload/c_fill,h_600,w_600,q_auto,f_auto/'); }

    async function loadGallery(isFull = false) {
      const targetGallery = isFull ? fullGallery : gallery;
      targetGallery.innerHTML = "";
      try {
        const q = isFull ? query(photosCol, orderBy("createdAt", "desc")) : query(photosCol, orderBy("createdAt", "desc"), limit(3));
        const snap = await getDocs(q);
        if (snap.empty) { document.getElementById("emptyMsg").style.display = "block"; return; }
        document.getElementById("emptyMsg").style.display = "none";
        
        snap.forEach((docSnap, index) => {
          const data = docSnap.data();
          const div = document.createElement("div");
          // 重點：在此加入 fade-in 類別，並根據順序加入微小的延遲讓它更有層次感
          div.className = "photo-item fade-in";
          div.style.animationDelay = `${index * 0.15}s`;
          
          div.innerHTML = `
            <img src="${getDisplayUrl(data.url)}" onclick="showPreview('${data.url.replace('/upload/', '/upload/c_limit,w_900,q_auto,f_auto/')}')">
            <div class="photo-buttons">
              <button class="btn-save" onclick="downloadImage('${data.url}')">保存</button>
              ${currentUser && data.ownerId === currentUser.uid ? `<button class="btn-danger" onclick="deletePhoto('${docSnap.id}')">刪除</button>` : ''}
            </div>
          `;
          targetGallery.appendChild(div);
        });
      } catch (e) { console.error(e); }
    }

    window.showPreview = (url) => { document.getElementById("previewImage").src = url; document.getElementById("previewOverlay").style.display = "flex"; };
    document.getElementById("previewOverlay").onclick = function() { this.style.display = "none"; };
    window.downloadImage = async (url) => {
      const res = await fetch(url, { mode: 'cors' });
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = "Wedding.jpg"; a.click();
    };
    window.deletePhoto = async (id) => {
      if (confirm("要刪除嗎？")) {
        await deleteDoc(doc(db, "wedding_photos", id));
        loadGallery(document.body.classList.contains('viewing-all'));
      }
    };
  </script>
</body>
</html>
